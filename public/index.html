<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskFlow API Tester</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d0f;
  --bg2: #151518;
  --bg3: #1c1c21;
  --bg4: #24242b;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0eff4;
  --text2: #9997ab;
  --text3: #5f5d72;
  --accent: #7c6fff;
  --accent2: #a594ff;
  --green: #3dd68c;
  --red: #ff5757;
  --amber: #ffb547;
  --cyan: #36d9d9;
  --pink: #ff6bcb;
  --radius: 10px;
  --radius-sm: 6px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ── Layout ── */
.app { display: flex; min-height: 100vh; }
.sidebar {
  width: 240px; min-width: 240px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 20px 0;
  position: sticky; top: 0; height: 100vh;
  overflow-y: auto;
}
.main { flex: 1; padding: 32px; overflow-x: hidden; }

/* ── Sidebar ── */
.sidebar-brand {
  padding: 0 20px 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.sidebar-brand h1 {
  font-family: 'Syne', sans-serif;
  font-size: 18px; font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
}
.brand-dot { color: var(--accent); }

.sidebar-nav-label {
  font-size: 10px; font-weight: 500; letter-spacing: 1px;
  color: var(--text3); text-transform: uppercase;
  padding: 0 20px; margin: 12px 0 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 20px; cursor: pointer;
  color: var(--text2); font-size: 13px;
  transition: all 0.15s; border-left: 2px solid transparent;
}
.nav-item:hover { color: var(--text); background: var(--bg3); }
.nav-item.active {
  color: var(--accent2); background: rgba(124,111,255,0.08);
  border-left-color: var(--accent);
}
.nav-icon { font-size: 16px; width: 18px; text-align: center; }
.nav-badge {
  margin-left: auto; font-size: 10px;
  background: rgba(124,111,255,0.2); color: var(--accent2);
  padding: 1px 6px; border-radius: 10px;
}
.nav-badge.admin { background: rgba(255,183,71,0.15); color: var(--amber); }

.sidebar-user {
  margin-top: auto; padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.user-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--pink));
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: #fff; flex-shrink: 0;
}
.user-info { min-width: 0; flex: 1; }
.user-name { font-size: 12px; font-weight: 500; color: var(--text); truncate: ellipsis; overflow: hidden; white-space: nowrap; }
.user-role {
  font-size: 10px; color: var(--text3);
}
.role-admin { color: var(--amber); }
.btn-logout {
  background: none; border: none; cursor: pointer;
  color: var(--text3); font-size: 16px; padding: 2px;
  transition: color 0.15s;
}
.btn-logout:hover { color: var(--red); }

/* ── Page Header ── */
.page-header { margin-bottom: 28px; }
.page-title {
  font-family: 'Syne', sans-serif;
  font-size: 26px; font-weight: 700; color: var(--text);
  letter-spacing: -0.5px; margin-bottom: 6px;
}
.page-subtitle { color: var(--text2); font-size: 13px; }

/* ── Auth Pages ── */
.auth-wrapper {
  min-height: 100vh; display: flex; align-items: center;
  justify-content: center; background: var(--bg);
  padding: 20px;
}
.auth-card {
  width: 100%; max-width: 420px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 36px;
}
.auth-logo {
  text-align: center; margin-bottom: 28px;
}
.auth-logo h1 {
  font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700;
}
.auth-logo p { color: var(--text2); font-size: 13px; margin-top: 4px; }
.auth-tabs {
  display: flex; gap: 0; background: var(--bg3); border-radius: var(--radius);
  padding: 3px; margin-bottom: 24px;
}
.auth-tab {
  flex: 1; padding: 7px; text-align: center;
  font-size: 13px; cursor: pointer; border-radius: 7px;
  color: var(--text2); transition: all 0.2s;
}
.auth-tab.active {
  background: var(--bg4); color: var(--text); font-weight: 500;
}

/* ── Forms ── */
.form-group { margin-bottom: 16px; }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }
label { font-size: 12px; color: var(--text2); margin-bottom: 5px; display: block; }
input, select, textarea {
  width: 100%; background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text); font-family: inherit; font-size: 13px;
  padding: 9px 12px; transition: border-color 0.15s;
  outline: none;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
}
select { cursor: pointer; }
select option { background: var(--bg3); }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 16px; border-radius: var(--radius-sm);
  font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; border: 1px solid transparent;
  transition: all 0.15s; white-space: nowrap;
}
.btn-primary {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
.btn-ghost {
  background: transparent; color: var(--text2);
  border-color: var(--border2);
}
.btn-ghost:hover { background: var(--bg3); color: var(--text); }
.btn-danger {
  background: transparent; color: var(--red); border-color: rgba(255,87,87,0.3);
}
.btn-danger:hover { background: rgba(255,87,87,0.1); }
.btn-success {
  background: transparent; color: var(--green); border-color: rgba(61,214,140,0.3);
}
.btn-success:hover { background: rgba(61,214,140,0.1); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-full { width: 100%; justify-content: center; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── Cards ── */
.card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.card-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; }

/* ── Stats Grid ── */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px; margin-bottom: 28px;
}
.stat-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
}
.stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.stat-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; color: var(--text); }
.stat-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

/* ── Task Cards ── */
.tasks-grid { display: flex; flex-direction: column; gap: 10px; }
.task-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  display: flex; align-items: flex-start; gap: 14px;
  transition: border-color 0.15s;
}
.task-card:hover { border-color: var(--border2); }
.task-indicator { width: 3px; border-radius: 10px; flex-shrink: 0; align-self: stretch; min-height: 40px; }
.task-content { flex: 1; min-width: 0; }
.task-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.task-desc { font-size: 12px; color: var(--text2); margin-bottom: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.task-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
.task-actions { display: flex; gap: 6px; }

/* ── Badges ── */
.badge {
  display: inline-flex; align-items: center;
  font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px;
}
.badge-todo     { background: rgba(255,255,255,0.06); color: var(--text2); }
.badge-in_progress { background: rgba(54,217,217,0.1); color: var(--cyan); }
.badge-done     { background: rgba(61,214,140,0.1); color: var(--green); }
.badge-archived { background: rgba(255,255,255,0.04); color: var(--text3); }
.badge-low      { background: rgba(61,214,140,0.08); color: var(--green); }
.badge-medium   { background: rgba(54,217,217,0.08); color: var(--cyan); }
.badge-high     { background: rgba(255,181,71,0.1); color: var(--amber); }
.badge-urgent   { background: rgba(255,87,87,0.1); color: var(--red); }
.badge-admin    { background: rgba(255,181,71,0.1); color: var(--amber); }
.badge-user     { background: rgba(124,111,255,0.1); color: var(--accent2); }
.badge-active   { background: rgba(61,214,140,0.1); color: var(--green); }
.badge-inactive { background: rgba(255,87,87,0.08); color: var(--red); }

/* ── Alerts ── */
.alert {
  padding: 10px 14px; border-radius: var(--radius-sm);
  font-size: 12px; margin-bottom: 16px;
  border: 1px solid transparent;
}
.alert-error {
  background: rgba(255,87,87,0.08); color: #ff8a8a;
  border-color: rgba(255,87,87,0.2);
}
.alert-success {
  background: rgba(61,214,140,0.08); color: #6ff5b0;
  border-color: rgba(61,214,140,0.2);
}
.alert-info {
  background: rgba(124,111,255,0.08); color: var(--accent2);
  border-color: rgba(124,111,255,0.2);
}

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 20px;
}
.modal {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 14px; padding: 28px; width: 100%; max-width: 480px;
  max-height: 90vh; overflow-y: auto;
}
.modal-title {
  font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 600;
  margin-bottom: 20px;
}
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

/* ── Table ── */
.table-wrapper { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  padding: 10px 14px; text-align: left;
  font-size: 11px; font-weight: 500; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  color: var(--text);
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }

/* ── Pagination ── */
.pagination {
  display: flex; align-items: center; gap: 8px;
  justify-content: flex-end; margin-top: 16px;
}
.page-info { font-size: 12px; color: var(--text3); }

/* ── API Console ── */
.console-wrapper {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-top: 16px;
}
.console-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  background: var(--bg4);
}
.console-method {
  font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
  padding: 2px 7px; border-radius: 4px;
}
.method-GET    { background: rgba(61,214,140,0.15); color: var(--green); }
.method-POST   { background: rgba(124,111,255,0.15); color: var(--accent2); }
.method-PUT    { background: rgba(255,181,71,0.15); color: var(--amber); }
.method-DELETE { background: rgba(255,87,87,0.15); color: var(--red); }
.method-PATCH  { background: rgba(54,217,217,0.15); color: var(--cyan); }
.console-url {
  font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text2); flex: 1;
}
.status-chip {
  font-family: 'DM Mono', monospace; font-size: 11px;
  padding: 2px 7px; border-radius: 4px; margin-left: auto;
}
.status-2xx { background: rgba(61,214,140,0.1); color: var(--green); }
.status-4xx { background: rgba(255,181,71,0.1); color: var(--amber); }
.status-5xx { background: rgba(255,87,87,0.1); color: var(--red); }
.console-body {
  padding: 14px;
  font-family: 'DM Mono', monospace; font-size: 12px;
  line-height: 1.7; color: var(--text2);
  max-height: 280px; overflow-y: auto;
  white-space: pre-wrap; word-break: break-all;
}

/* ── Loader ── */
.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent2);
  border-radius: 50%; animation: spin 0.7s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Misc ── */
.flex { display: flex; }
.flex-1 { flex: 1; }
.items-center { align-items: center; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.mb-4 { margin-bottom: 16px; }
.mb-6 { margin-bottom: 24px; }
.text-sm { font-size: 12px; }
.text-muted { color: var(--text2); }
.empty-state {
  text-align: center; padding: 48px 20px;
  color: var(--text3); font-size: 13px;
}
.empty-icon { font-size: 32px; margin-bottom: 12px; }
.tag {
  display: inline-flex; background: var(--bg4);
  font-size: 11px; color: var(--text2);
  padding: 2px 8px; border-radius: 4px; gap: 2px;
}
.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── API Layer ──────────────────────────────────────────────────────
const BASE = window.location.origin + '/api/v1';

let accessToken = localStorage.getItem('access_token');
let refreshToken = localStorage.getItem('refresh_token');
let isRefreshing = false;
let failedQueue = [];

const processQueue = (err, token) => {
  failedQueue.forEach(p => err ? p.reject(err) : p.resolve(token));
  failedQueue = [];
};

const apiRequest = async (method, path, body, skipAuth = false) => {
  const url = `${BASE}${path}`;
  const headers = { 'Content-Type': 'application/json' };
  if (accessToken && !skipAuth) headers['Authorization'] = `Bearer ${accessToken}`;
  
  const res = await fetch(url, {
    method, headers,
    body: body ? JSON.stringify(body) : undefined,
  });

  if (res.status === 401 && !skipAuth && refreshToken) {
    if (isRefreshing) {
      return new Promise((resolve, reject) => failedQueue.push({ resolve, reject }))
        .then(t => apiRequest(method, path, body));
    }
    isRefreshing = true;
    try {
      const rRes = await fetch(`${BASE}/auth/refresh`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: refreshToken }),
      });
      const rData = await rRes.json();
      if (!rRes.ok) throw new Error('Refresh failed');
      accessToken = rData.data.tokens.access_token;
      refreshToken = rData.data.tokens.refresh_token;
      localStorage.setItem('access_token', accessToken);
      localStorage.setItem('refresh_token', refreshToken);
      processQueue(null, accessToken);
      return apiRequest(method, path, body);
    } catch {
      processQueue(new Error('Auth expired'), null);
      localStorage.clear();
      window.dispatchEvent(new Event('auth:logout'));
      throw new Error('Session expired');
    } finally { isRefreshing = false; }
  }

  const data = await res.json();
  return { ok: res.ok, status: res.status, data };
};

const api = {
  post: (p, b, s) => apiRequest('POST', p, b, s),
  get:  (p, s)    => apiRequest('GET',  p, null, s),
  put:  (p, b)    => apiRequest('PUT',  p, b),
  patch:(p, b)    => apiRequest('PATCH', p, b),
  del:  (p)       => apiRequest('DELETE', p),
};

// ── Utilities ─────────────────────────────────────────────────────
const getInitials = (user) => {
  if (!user) return '?';
  if (user.first_name) return (user.first_name[0] + (user.last_name?.[0] || '')).toUpperCase();
  return user.username?.[0]?.toUpperCase() || '?';
};

const formatDate = (d) => {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
};

const priorityColor = { low: 'var(--green)', medium: 'var(--cyan)', high: 'var(--amber)', urgent: 'var(--red)' };

// ── Components ────────────────────────────────────────────────────
const Spinner = () => <span className="spinner" />;

const Alert = ({ type = 'error', children, onClose }) => (
  <div className={`alert alert-${type}`} style={{ display: 'flex', alignItems: 'flex-start', gap: 8 }}>
    <span style={{ flex: 1 }}>{children}</span>
    {onClose && <span onClick={onClose} style={{ cursor: 'pointer', opacity: 0.6 }}>✕</span>}
  </div>
);

const Badge = ({ label, type }) => <span className={`badge badge-${type || label?.toLowerCase()?.replace(' ', '_')}`}>{label}</span>;

const APIConsole = ({ log }) => {
  if (!log) return null;
  const statusClass = log.status >= 500 ? 'status-5xx' : log.status >= 400 ? 'status-4xx' : 'status-2xx';
  return (
    <div className="console-wrapper">
      <div className="console-header">
        <span className={`console-method method-${log.method}`}>{log.method}</span>
        <span className="console-url">{log.url}</span>
        {log.status && <span className={`status-chip ${statusClass}`}>{log.status}</span>}
      </div>
      <div className="console-body">
        {JSON.stringify(log.data, null, 2)}
      </div>
    </div>
  );
};

// ── Auth Page ─────────────────────────────────────────────────────
const AuthPage = ({ onLogin }) => {
  const [tab, setTab] = useState('login');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [apiLog, setApiLog] = useState(null);

  const [loginForm, setLoginForm] = useState({ email: '', password: '' });
  const [regForm, setRegForm] = useState({ email: '', username: '', password: '', first_name: '', last_name: '' });

  const handleLogin = async (e) => {
    e.preventDefault(); setLoading(true); setError('');
    try {
      const res = await api.post('/auth/login', loginForm, true);
      setApiLog({ method: 'POST', url: `${BASE}/auth/login`, status: res.status, data: res.data });
      if (!res.ok) { setError(res.data.message || 'Login failed'); return; }
      const { user, tokens } = res.data.data;
      accessToken = tokens.access_token; refreshToken = tokens.refresh_token;
      localStorage.setItem('access_token', tokens.access_token);
      localStorage.setItem('refresh_token', tokens.refresh_token);
      onLogin(user);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  };

  const handleRegister = async (e) => {
    e.preventDefault(); setLoading(true); setError('');
    try {
      const res = await api.post('/auth/register', regForm, true);
      setApiLog({ method: 'POST', url: `${BASE}/auth/register`, status: res.status, data: res.data });
      if (!res.ok) { setError(res.data.message || 'Registration failed'); return; }
      const { user, tokens } = res.data.data;
      accessToken = tokens.access_token; refreshToken = tokens.refresh_token;
      localStorage.setItem('access_token', tokens.access_token);
      localStorage.setItem('refresh_token', tokens.refresh_token);
      onLogin(user);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  };

  return (
    <div className="auth-wrapper">
      <div style={{ width: '100%', maxWidth: 480 }}>
        <div className="auth-card">
          <div className="auth-logo">
            <h1>Task<span className="brand-dot">Flow</span></h1>
            <p>REST API with Auth &amp; RBAC — Test Interface</p>
          </div>

          <div className="auth-tabs">
            <div className={`auth-tab ${tab === 'login' ? 'active' : ''}`} onClick={() => { setTab('login'); setError(''); }}>Sign In</div>
            <div className={`auth-tab ${tab === 'register' ? 'active' : ''}`} onClick={() => { setTab('register'); setError(''); }}>Register</div>
          </div>

          {error && <Alert type="error" onClose={() => setError('')}>{error}</Alert>}

          {tab === 'login' ? (
            <form onSubmit={handleLogin}>
              <div className="form-group">
                <label>Email</label>
                <input type="email" placeholder="admin@example.com" value={loginForm.email}
                  onChange={e => setLoginForm({...loginForm, email: e.target.value})} required />
              </div>
              <div className="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" value={loginForm.password}
                  onChange={e => setLoginForm({...loginForm, password: e.target.value})} required />
              </div>
              <div className="alert alert-info" style={{ marginBottom: 16 }}>
                <strong>Demo Admin:</strong> admin@example.com / Admin@123
              </div>

// ── Task Modal ────────────────────────────────────────────────────
const TaskModal = ({ task, onClose, onSave }) => {
  const isEdit = !!task?.id;
  const [form, setForm] = useState({
    title: task?.title || '',
    description: task?.description || '',
    status: task?.status || 'todo',
    priority: task?.priority || 'medium',
    due_date: task?.due_date ? task.due_date.split('T')[0] : '',
    tags: (task?.tags || []).join(', '),
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const handleSubmit = async (e) => {
    e.preventDefault(); setLoading(true); setError('');
    try {
      const payload = {
        ...form,
        tags: form.tags.split(',').map(t => t.trim()).filter(Boolean),
        due_date: form.due_date || null,
        description: form.description || null,
      };
      const res = isEdit
        ? await api.put(`/tasks/${task.id}`, payload)
        : await api.post('/tasks', payload);
      if (!res.ok) { setError(res.data.message || 'Failed to save task'); return; }
      onSave(res.data.data);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); }
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <h2 className="modal-title">{isEdit ? 'Edit Task' : 'New Task'}</h2>
        {error && <Alert type="error">{error}</Alert>}
        <form onSubmit={handleSubmit}>
          <div className="form-group">
            <label>Title *</label>
            <input value={form.title} onChange={e => setForm({...form, title: e.target.value})} required placeholder="Task title" />
          </div>
          <div className="form-group">
            <label>Description</label>
            <textarea rows={3} value={form.description} onChange={e => setForm({...form, description: e.target.value})} placeholder="Optional description..." style={{ resize: 'vertical' }} />
          </div>
          <div className="form-row">
            <div className="form-group">
              <label>Status</label>
              <select value={form.status} onChange={e => setForm({...form, status: e.target.value})}>
                <option value="todo">To Do</option>
                <option value="in_progress">In Progress</option>
                <option value="done">Done</option>
                <option value="archived">Archived</option>
              </select>
            </div>
            <div className="form-group">
              <label>Priority</label>
              <select value={form.priority} onChange={e => setForm({...form, priority: e.target.value})}>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="urgent">Urgent</option>
              </select>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label>Due Date</label>
              <input type="date" value={form.due_date} onChange={e => setForm({...form, due_date: e.target.value})} />
            </div>
            <div className="form-group">
              <label>Tags <span style={{ color: 'var(--text3)', fontSize: 11 }}>(comma separated)</span></label>
              <input value={form.tags} onChange={e => setForm({...form, tags: e.target.value})} placeholder="api, backend, urgent" />
            </div>
          </div>
          <div className="modal-footer">
            <button type="button" className="btn btn-ghost" onClick={onClose}>Cancel</button>
            <button type="submit" className="btn btn-primary" disabled={loading}>
              {loading ? <Spinner /> : (isEdit ? 'Save Changes' : 'Create Task')}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
};

// ── Tasks Page ─────────────────────────────────────────────────────
const TasksPage = ({ user }) => {
  const [tasks, setTasks] = useState([]);
  const [pagination, setPagination] = useState({ page: 1, limit: 10, total: 0, totalPages: 1 });
  const [loading, setLoading] = useState(true);
  const [filters, setFilters] = useState({ status: '', priority: '', search: '' });
  const [modal, setModal] = useState(null); // null | 'create' | task object
  const [apiLog, setApiLog] = useState(null);
  const [msg, setMsg] = useState('');
  const [deleting, setDeleting] = useState(null);

  const fetchTasks = useCallback(async (page = 1) => {
    setLoading(true);
    const params = new URLSearchParams({ page, limit: 10 });
    if (filters.status) params.set('status', filters.status);
    if (filters.priority) params.set('priority', filters.priority);
    if (filters.search) params.set('search', filters.search);
    const path = `/tasks?${params}`;
    const res = await api.get(path);
    setApiLog({ method: 'GET', url: BASE + path, status: res.status, data: res.data });
    if (res.ok) {
      setTasks(res.data.data);
      setPagination(res.data.pagination);
    }
    setLoading(false);
  }, [filters]);

  useEffect(() => { fetchTasks(1); }, [fetchTasks]);

  const handleSave = async (task) => {
    setModal(null);
    setMsg('Task saved successfully');
    fetchTasks(pagination.page);
    setTimeout(() => setMsg(''), 3000);
  };

  const handleDelete = async (id) => {
    if (!window.confirm('Delete this task?')) return;
    setDeleting(id);
    const res = await api.del(`/tasks/${id}`);
    setApiLog({ method: 'DELETE', url: `${BASE}/tasks/${id}`, status: res.status, data: res.data });
    if (res.ok) {
      setMsg('Task deleted');
      fetchTasks(pagination.page);
      setTimeout(() => setMsg(''), 3000);
    }
    setDeleting(null);
  };

  return (
    <div>
      <div className="page-header">
        <div className="flex items-center gap-3" style={{ marginBottom: 6 }}>
          <h1 className="page-title" style={{ marginBottom: 0 }}>Tasks</h1>
          <button className="btn btn-primary btn-sm" onClick={() => setModal('create')}>+ New Task</button>
        </div>
        <p className="page-subtitle">Manage your tasks — create, update, filter &amp; delete.</p>
      </div>

      {msg && <Alert type="success" onClose={() => setMsg('')}>{msg}</Alert>}

      <div className="card mb-4">
        <div className="flex gap-2" style={{ flexWrap: 'wrap' }}>
          <input placeholder="Search tasks..." value={filters.search}
            onChange={e => setFilters({...filters, search: e.target.value})}
            style={{ flex: '1', minWidth: 200 }} />
          <select value={filters.status} onChange={e => setFilters({...filters, status: e.target.value})} style={{ width: 140 }}>
            <option value="">All Statuses</option>
            <option value="todo">To Do</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
            <option value="archived">Archived</option>
          </select>
          <select value={filters.priority} onChange={e => setFilters({...filters, priority: e.target.value})} style={{ width: 140 }}>
            <option value="">All Priorities</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="urgent">Urgent</option>
          </select>
        </div>
      </div>

      {loading ? (
        <div style={{ textAlign: 'center', padding: 40 }}><Spinner /></div>
      ) : tasks.length === 0 ? (
        <div className="empty-state">
          <div className="empty-icon">📋</div>
          <p>No tasks found. Create one to get started.</p>
        </div>
      ) : (
        <div className="tasks-grid">
          {tasks.map(task => (
            <div key={task.id} className="task-card">
              <div className="task-indicator" style={{ background: priorityColor[task.priority] || 'var(--text3)' }} />
              <div className="task-content">
                <div className="task-title">{task.title}</div>
                {task.description && <div className="task-desc">{task.description}</div>}
                <div className="task-meta">
                  <Badge label={task.status.replace('_', ' ')} type={task.status} />
                  <Badge label={task.priority} type={task.priority} />
                  {task.due_date && (
                    <span className="text-sm text-muted">Due {formatDate(task.due_date)}</span>
                  )}
                  {task.tags?.map(t => <span key={t} className="tag">#{t}</span>)}
                </div>
              </div>
              <div className="task-actions">
                <button className="btn btn-ghost btn-sm" onClick={() => setModal(task)}>Edit</button>
                <button className="btn btn-danger btn-sm" disabled={deleting === task.id}
                  onClick={() => handleDelete(task.id)}>
                  {deleting === task.id ? <Spinner /> : 'Delete'}
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {pagination.totalPages > 1 && (
        <div className="pagination">
          <button className="btn btn-ghost btn-sm" disabled={!pagination.hasPrev}
            onClick={() => fetchTasks(pagination.page - 1)}>← Prev</button>
          <span className="page-info">Page {pagination.page} of {pagination.totalPages} ({pagination.total} total)</span>
          <button className="btn btn-ghost btn-sm" disabled={!pagination.hasNext}
            onClick={() => fetchTasks(pagination.page + 1)}>Next →</button>
        </div>
      )}

      <APIConsole log={apiLog} />

      {modal && (
        <TaskModal
          task={modal === 'create' ? null : modal}
          onClose={() => setModal(null)}
          onSave={handleSave}
        />
      )}
    </div>
  );
};

// ── Admin Users Page ───────────────────────────────────────────────
const AdminPage = () => {
  const [users, setUsers] = useState([]);
  const [pagination, setPagination] = useState({ page: 1, totalPages: 1 });
  const [loading, setLoading] = useState(true);
  const [apiLog, setApiLog] = useState(null);
  const [msg, setMsg] = useState({ type: '', text: '' });

  const fetchUsers = async (page = 1) => {
    setLoading(true);
    const res = await api.get(`/admin/users?page=${page}&limit=10`);
    setApiLog({ method: 'GET', url: `${BASE}/admin/users?page=${page}`, status: res.status, data: res.data });
    if (res.ok) { setUsers(res.data.data); setPagination(res.data.pagination); }
    setLoading(false);
  };

  useEffect(() => { fetchUsers(); }, []);

  const handleRoleChange = async (id, newRole) => {
    const res = await api.patch(`/admin/users/${id}/role`, { role: newRole });
    setApiLog({ method: 'PATCH', url: `${BASE}/admin/users/${id}/role`, status: res.status, data: res.data });
    if (res.ok) { setMsg({ type: 'success', text: 'Role updated' }); fetchUsers(pagination.page); }
    else setMsg({ type: 'error', text: res.data.message });
    setTimeout(() => setMsg({ type: '', text: '' }), 3000);
  };

  const handleToggle = async (id) => {
    const res = await api.patch(`/admin/users/${id}/toggle-active`);
    setApiLog({ method: 'PATCH', url: `${BASE}/admin/users/${id}/toggle-active`, status: res.status, data: res.data });
    if (res.ok) { setMsg({ type: 'success', text: 'Status updated' }); fetchUsers(pagination.page); }
    else setMsg({ type: 'error', text: res.data.message });
    setTimeout(() => setMsg({ type: '', text: '' }), 3000);
  };

  const handleDelete = async (id) => {
    if (!window.confirm('Permanently delete this user?')) return;
    const res = await api.del(`/admin/users/${id}`);
    setApiLog({ method: 'DELETE', url: `${BASE}/admin/users/${id}`, status: res.status, data: res.data });
    if (res.ok) { setMsg({ type: 'success', text: 'User deleted' }); fetchUsers(pagination.page); }
    else setMsg({ type: 'error', text: res.data.message });
    setTimeout(() => setMsg({ type: '', text: '' }), 3000);
  };

  return (
    <div>
      <div className="page-header">
        <h1 className="page-title">User Management</h1>
        <p className="page-subtitle">Admin-only panel. Manage roles, status, and user accounts.</p>

      {msg.text && <Alert type={msg.type} onClose={() => setMsg({ type: '', text: '' })}>{msg.text}</Alert>}
      <div className="card">
        <div className="table-wrapper">
          {loading ? (
            <div style={{ textAlign: 'center', padding: 32 }}><Spinner /></div>
          ) : (
            <table>
              <thead>
                <tr><th>User</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr>
              </thead>
              <tbody>
                {users.map(u => (
                  <tr key={u.id}>
                    <td>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                        <div style={{ width: 30, height: 30, borderRadius: '50%', background: 'linear-gradient(135deg, var(--accent), var(--pink))', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 600, color: '#fff', flexShrink: 0 }}>
                          {getInitials(u)}
                        </div>
                        <div>
                          <div style={{ fontSize: 13, fontWeight: 500 }}>{u.username}</div>
                          <div style={{ fontSize: 11, color: 'var(--text3)' }}>{u.email}</div>

            </div>
            <div className="alert alert-info" style={{ marginBottom: 16, fontSize: 11 }}>
              Changing your password revokes all sessions and logs you out everywhere.
            </div>
            <button type="submit" className="btn btn-primary" disabled={pwLoading}>
              {pwLoading ? <Spinner /> : 'Change Password'}
            </button>
          </form>
        </div>
      </div>

      <APIConsole log={apiLog} />
    </div>
  );
};

// ── App Shell ──────────────────────────────────────────────────────
const App = () => {
  const [user, setUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem('user')); } catch { return null; }
  });
  const [page, setPage] = useState('dashboard');

  useEffect(() => {
    const handleLogout = () => setUser(null);
    window.addEventListener('auth:logout', handleLogout);
    return () => window.removeEventListener('auth:logout', handleLogout);
  }, []);

  const handleLogin = (u) => {
    localStorage.setItem('user', JSON.stringify(u));
    setUser(u);
    setPage('dashboard');
  };

  const handleLogout = async () => {
    try { await api.post('/auth/logout', { refresh_token: refreshToken }); } catch {}
    localStorage.clear();
    accessToken = null; refreshToken = null;
    setUser(null);
  };

  if (!user) return <AuthPage onLogin={handleLogin} />;

  const isAdmin = user?.role === 'admin';

  const navItems = [
    { id: 'dashboard', icon: '⬡', label: 'Dashboard' },
    { id: 'tasks', icon: '◈', label: 'Tasks' },
    ...(isAdmin ? [{ id: 'admin', icon: '⬟', label: 'Users', badge: 'admin' }] : []),
    { id: 'profile', icon: '◎', label: 'Profile' },
  ];

  return (
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-brand">
          <h1>Task<span className="brand-dot">Flow</span></h1>
          <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 2 }}>API Test Interface v1</div>
        </div>

        <div className="sidebar-nav-label">Navigation</div>
        {navItems.map(item => (
          <div key={item.id} className={`nav-item ${page === item.id ? 'active' : ''}`}
            onClick={() => setPage(item.id)}>
            <span className="nav-icon">{item.icon}</span>
            {item.label}
            {item.badge && <span className={`nav-badge ${item.badge}`}>{item.badge}</span>}
          </div>
        ))}

        <div className="sidebar-nav-label" style={{ marginTop: 16 }}>Docs</div>
        <div className="nav-item" onClick={() => window.open('/api-docs', '_blank')}>
          <span className="nav-icon">⬡</span> Swagger UI
          <span style={{ marginLeft: 'auto', fontSize: 12 }}>↗</span>
        </div>
        <div className="nav-item" onClick={() => window.open('/health', '_blank')}>
          <span className="nav-icon">◉</span> Health Check
          <span style={{ marginLeft: 'auto', fontSize: 12 }}>↗</span>
        </div>

        <div className="sidebar-user">
          <div className="user-avatar">{getInitials(user)}</div>
          <div className="user-info">
            <div className="user-name">{user?.first_name || user?.username}</div>
            <div className={`user-role ${isAdmin ? 'role-admin' : ''}`}>{user?.role}</div>
          </div>
          <button className="btn-logout" onClick={handleLogout} title="Logout">⏻</button>
        </div>
      </aside>

      <main className="main">
        {page === 'dashboard' && <DashboardPage user={user} />}
        {page === 'tasks' && <TasksPage user={user} />}
        {page === 'admin' && isAdmin && <AdminPage />}
        {page === 'profile' && <ProfilePage user={user} onUpdate={u => { setUser({...user, ...u}); localStorage.setItem('user', JSON.stringify({...user, ...u})); }} />}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
